name: iOS Build

on:
  push:
    branches: [ "apple" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build KMP Shared Framework
        run: |
          chmod +x ./gradlew
          ./gradlew :app:embedAndSignAppleFrameworkForXcode
        env:
          CONFIGURATION: Release
          ARCHS: arm64
          EXPANDED_CODE_SIGN_IDENTITY: "-"

      - name: Build iOS App (Unsigned)
        run: |
          cd iosApp
          xcodebuild clean build \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Payload (Payload/iosApp.app -> app.ipa)
        run: |
          cd iosApp/build/Release-iphoneos
          mkdir -p Payload
          cp -r iosApp.app Payload/
          zip -r iosApp.ipa Payload
        
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosApp-unsigned
          path: iosApp/build/Release-iphoneos/iosApp.ipa
          retention-days: 7
